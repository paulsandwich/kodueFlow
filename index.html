<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kodueFlow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="warning-banner" class="warning-banner" style="display:none;">
    ⚠️ 你的瀏覽器不支援 Web Audio API，已切換為視覺模式（無音效，計時精度降低）。
  </div>

  <div class="app-layout">

    <!-- 左側控制面板 -->
    <aside class="control-panel">
      <div class="panel-title">kodueFlow</div>

      <div class="control-group">
        <label class="control-label">BPM</label>
        <div class="bpm-row">
          <button class="bpm-btn" id="bpm-down">▼</button>
          <input type="number" id="bpm-input" class="number-input bpm-input" value="120" min="20" max="300">
          <button class="bpm-btn" id="bpm-up">▲</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">拍號</label>
        <div class="timesig-row">
          <input type="number" id="beats-input" class="number-input small" value="4" min="1" max="16">
          <span class="timesig-slash">/</span>
          <select id="beat-unit-select" class="select-input small">
            <option value="2">2</option>
            <option value="4" selected>4</option>
            <option value="8">8</option>
            <option value="16">16</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">每循環小節數</label>
        <input type="number" id="measures-input" class="number-input" value="8" min="1" max="64">
      </div>

      <div class="control-group">
        <label class="control-label">循環次數</label>
        <div class="loop-row">
          <input type="number" id="loop-count-input" class="number-input small" value="4" min="1" max="99">
          <label class="inline-label">
            <input type="checkbox" id="infinite-check"> ∞
          </label>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">細分 (Subdivision)</label>
        <div class="subdiv-row">
          <label class="inline-label">
            <input type="checkbox" id="subdiv-check"> 開啟
          </label>
          <select id="subdiv-value-select" class="select-input small" disabled>
            <option value="2">÷2</option>
            <option value="3">÷3</option>
            <option value="4">÷4</option>
          </select>
        </div>
      </div>

      <button id="apply-btn" class="apply-btn">套用結構設定</button>
      <button id="start-stop-btn" class="start-stop-btn">▶ START</button>
    </aside>

    <!-- 右側視覺化區域 -->
    <main class="visualizer">

      <div class="dashboard">
        <div class="dash-item">
          <div class="dash-label">BPM</div>
          <div class="dash-value" id="dash-bpm">120</div>
        </div>
        <div class="dash-item">
          <div class="dash-label">MEASURE</div>
          <div class="dash-value" id="dash-measure">- / 8</div>
        </div>
        <div class="dash-item">
          <div class="dash-label">LOOP</div>
          <div class="dash-value" id="dash-loop">- / 4</div>
        </div>
      </div>

      <div id="beat-dots" class="beat-dots"></div>

      <div id="measure-grid" class="measure-grid"></div>

    </main>

  </div>

  <script src="js/scheduler.js"></script>
  <script src="js/metronome.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
